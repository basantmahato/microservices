services:
  client:
    build:
      context: ./client
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    environment:
      CLIENT_PORT: 5173
    expose:
      - "5173"
    depends_on:
      - main-backend

  main-backend:
    build:
      context: ./services/main-backend
    environment:
      MAIN_BACKEND_PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:3001
      BLOG_SERVICE_URL: http://blog-service:3002
    expose:
      - "3000"
    depends_on:
      - auth-service
      - blog-service

  auth-service:
    build:
      context: ./services/auth-service
    environment:
      AUTH_SERVICE_PORT: 3001
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-auth_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-auth_password}
      POSTGRES_DB: ${POSTGRES_DB:-auth_db}
      JWT_SECRET: ${JWT_SECRET:-replace-this-secret}
    depends_on:
      postgres:
        condition: service_healthy

  blog-service:
    build:
      context: ./services/blog-service
    environment:
      BLOG_SERVICE_PORT: 3002
      MONGO_URI: mongodb://mongo:27017/${MONGO_DATABASE:-blog_db}
    depends_on:
      mongo:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-auth_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-auth_password}
      POSTGRES_DB: ${POSTGRES_DB:-auth_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-auth_user} -d ${POSTGRES_DB:-auth_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  mongo_data:
